version: '3.8'

services:
  # NATS JetStream
  nats:
    image: nats:2.10-alpine
    container_name: rigour-nats
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "4222:4222"   # Client
      - "8222:8222"   # Monitoring
    volumes:
      - nats-data:/data
    networks:
      - rigour-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # OpenSearch (single node for dev)
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: rigour-opensearch
    environment:
      - discovery.type=single-node
      # Adjust -Xms/-Xmx based on available memory
      - OPENSEARCH_JAVA_OPTS=-Xms2g -Xmx2g
      # Dev only - enable security for production
      - DISABLE_SECURITY_PLUGIN=true
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - rigour-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: rigour-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rigour-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  enrichment-worker:
    build:
      context: ./rigour
      dockerfile: Dockerfile.enrichment
    container_name: rigour-enrichment
    depends_on:
      nats:
        condition: service_healthy
    command:
      - "--nats-url=nats://nats:4222"
      - "--geoip-city=/data/geoip/GeoLite2-City.mmdb"
      - "--geoip-asn=/data/geoip/GeoLite2-ASN.mmdb"
    volumes:
      - geoipupdate_data:/data/geoip
    deploy:
      replicas: 3
    networks:
      - rigour-network
    restart: unless-stopped

  opensearch-indexer:
    build:
      context: ./rigour
      dockerfile: Dockerfile.indexer
    container_name: rigour-indexer
    depends_on:
      nats:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    command:
      - "--nats-url=nats://nats:4222"
      - "--opensearch-urls=http://opensearch:9200"
    networks:
      - rigour-network
    restart: unless-stopped

  scanner-agent:
    build:
      context: ./rigour
      dockerfile: Dockerfile.scanner
    container_name: rigour-scanner-agent
    cap_add:
      - NET_RAW
    depends_on:
      nats:
        condition: service_healthy
    command:
      - "--nats-url=nats://nats:4222"
    networks:
      - rigour-network
    restart: unless-stopped

volumes:
  nats-data:
  opensearch-data:
  redis-data:
  geoipupdate_data:

networks:
  rigour-network:
    driver: bridge
